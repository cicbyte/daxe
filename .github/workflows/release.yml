name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.2.3，会自动加 v 前缀)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare build vars
        id: buildvars
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          BUILDTIME=$(date -u '+%Y-%m-%dT%H:%M:%S')
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.GitCommit=${COMMIT} -X main.BuildTime=${BUILDTIME}"
          echo "ldflags=${LDFLAGS}" >> "$GITHUB_OUTPUT"

      - name: Build Windows
        run: go build -ldflags "${{ steps.buildvars.outputs.ldflags }}" -o dist/daxe_windows_amd64.exe

      - name: Build Linux
        run: go build -ldflags "${{ steps.buildvars.outputs.ldflags }}" -o dist/daxe_linux_amd64

      - name: Build macOS
        run: go build -ldflags "${{ steps.buildvars.outputs.ldflags }}" -o dist/daxe_darwin_amd64

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
